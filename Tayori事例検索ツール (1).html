const ISSUES = [
  "①問い合わせの属人化・対応漏れ",
  "②FAQ未整備・同じ質問の繰り返し",
  "③顧客満足度が測れていない",
  "④社内申請・問い合わせの管理が煩雑",
  "⑤対応ステータスの可視化ができていない"
];

const GOALS = [
  "A. CS業務の工数削減・効率化",
  "B. 問い合わせ件数の削減",
  "C. 顧客満足度の向上・測定",
  "D. 社内ナレッジの整備",
  "E. データ収集・分析基盤の構築"
];

function getIndustries() {
  const set = new Set(CASES.map(c => c.industry).filter(Boolean));
  return [...set].sort();
}

function populateSelects() {
  const indSel = document.getElementById('industryFilter');
  getIndustries().forEach(ind => {
    const opt = document.createElement('option');
    opt.value = ind;
    opt.textContent = ind;
    indSel.appendChild(opt);
  });

  const issSel = document.getElementById('issueFilter');
  ISSUES.forEach(i => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i;
    issSel.appendChild(opt);
  });

  const goalSel = document.getElementById('goalFilter');
  GOALS.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g;
    opt.textContent = g;
    goalSel.appendChild(opt);
  });
}

function applyFilters() {
  const ind = document.getElementById('industryFilter').value;
  const iss = document.getElementById('issueFilter').value;
  const goal = document.getElementById('goalFilter').value;

  let filtered = CASES;
  if (ind) filtered = filtered.filter(c => c.industry === ind);
  if (iss) filtered = filtered.filter(c => c.issue === iss);
  if (goal) filtered = filtered.filter(c => c.goal === goal);

  renderCards(filtered);
  document.getElementById('resultCount').textContent = filtered.length;
}

function resetFilters() {
  document.getElementById('industryFilter').value = '';
  document.getElementById('issueFilter').value = '';
  document.getElementById('goalFilter').value = '';
  applyFilters();
}

function renderCards(cases) {
  const grid = document.getElementById('cardsGrid');
  if (cases.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">🔍</div>
        <h3>該当する事例が見つかりませんでした</h3>
        <p>フィルターの条件を変えてお試しください</p>
      </div>`;
    return;
  }

  grid.innerHTML = cases.map(c => {
    const isUnset = !c.issue && !c.goal;
    const funcLabel = c.functions.join('・');

    const issueTag = isUnset
      ? `<span class="tag tag-issue-unset">● 課題未設定</span>`
      : `<span class="tag tag-issue-set">📌 ${c.issue}</span>`;

    const bodySection = isUnset
      ? `<div class="warn-box">
           <span class="warn-icon">⚠️</span>
           <span>この事例はまだ課題・ゴール・トークポイントが未設定です。Claudeに「${c.company}の紹介角度とトークポイントを追加して」と依頼してください。</span>
         </div>`
      : `<div class="issue-goal-section">
           <span class="body-tag body-tag-issue">${c.issue}</span>
           <span class="body-tag body-tag-goal">${c.goal}</span>
         </div>`;

    const talkSection = c.talkpoints
      ? `<div style="font-size:12px;color:#374151;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;margin-bottom:10px;">
           <div style="font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px;">💬 商談トークポイント</div>
           ${c.talkpoints}
         </div>` : '';

    const linkSection = c.url
      ? `<div class="card-footer">
           <a href="${c.url}" class="confirm-link" target="_blank">
             <span class="link-icon">🔗</span> 事例を確認
           </a>
         </div>` : '';

    return `
      <div class="case-card">
        <div class="card-header">
          <div class="card-no">事例 No.${c.no}</div>
          <div class="card-company">${c.company}</div>
          <div class="card-tags">
            <span class="tag tag-industry">${c.industry}</span>
            <span class="tag tag-function">${funcLabel}</span>
            ${isUnset
              ? `<span class="tag tag-issue-unset">課題未設定</span>`
              : `<span class="tag tag-issue-set">設定済み</span>`
            }
          </div>
        </div>
        <div class="card-body">
          <div class="use-case-box">
            <div class="use-case-header">
              <span class="use-case-icon">📋</span>
              ${funcLabel}
            </div>
            <div class="use-case-meta">対象: ${c.target}　用途: ${c.usage}</div>
            <div class="use-case-memo">${c.memo}</div>
          </div>
          ${bodySection}
          ${talkSection}
        </div>
        ${linkSection}
      </div>
    `;
  }).join('');
}

applyFilters();
